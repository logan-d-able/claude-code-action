name: Multi-Agent Review (Test)

# TEMPORARY workflow for E2E validation of the multi-agent review refactor.
# Runs the action directly from this checkout (`uses: ./`) so PRs on this
# branch exercise the in-tree code. Remove before merging to main.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  multi-agent-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Multi-agent review
        uses: ./
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: "true"
          multi_agent_review: "auto"
          review_debate_rounds: "1"
          claude_args: |
            --model "claude-opus-4-7"
